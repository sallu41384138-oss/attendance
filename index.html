<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Attendance App Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .attendance-card, .admin-login-card, .report-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 100%;
            width: 100%;
            margin-bottom: 25px;
            box-sizing: border-box;
        }
        .attendance-card { max-width: 380px; text-align: center; position: relative; }
        .admin-login-card { max-width: 380px; text-align: center; display: none; }
        
        h2 { color: #1a73e8; margin-bottom: 8px; font-size: 24px; margin-top: 0; }
        h3 { color: #3c4043; margin-top: 0; font-size: 18px; }
        p.info { color: #5f6368; font-size: 14px; margin-bottom: 25px; }
        
        .emp-input, .admin-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-submit {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn-submit:active { background-color: #1557b0; }
        .btn-submit:disabled { background-color: #bcc1c8; cursor: not-allowed; }
        
        .secret-dot {
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            display: inline-block;
            user-select: none;
        }

        #responseMessage {
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .success { background-color: #e6f4ea; color: #137333; }
        .error { background-color: #fce8e6; color: #c5221f; }
        .loading { background-color: #f1f3f4; color: #3c4043; }

        .excel-filter-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
        }
        .month-dropdown {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid #ccd0d5;
            background: white;
            color: #1a73e8;
        }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }
        
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 11px; background: white; min-width: 2400px; }
        th, td { padding: 8px 6px; border: 1px solid #dcdcdc; vertical-align: middle; }
        th { background-color: #f1f3f4; color: #3c4043; font-weight: bold; }
        
        .day-subtext { display: block; font-size: 10px; color: #65676b; font-weight: normal; margin-top: 2px; }
        .meta-cell { text-align: left; background-color: #fafafa; font-weight: bold; padding-left: 8px; }
        
        .time-box-container { display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center; }
        .grid-time-in { color: #137333; font-weight: bold; font-size: 10px; background: #e6f4ea; padding: 2px 4px; border-radius: 4px; display: inline-block; width: 65px; text-align: center; }
        .grid-time-late { color: #b06000; font-weight: bold; font-size: 10px; background: #fff4e5; padding: 2px 4px; border-radius: 4px; display: inline-block; width: 65px; text-align: center; }
        .grid-time-out { color: #1a73e8; font-weight: bold; font-size: 10px; background: #e8f0fe; padding: 2px 4px; border-radius: 4px; display: inline-block; width: 65px; text-align: center; }
        .grid-a { color: #c5221f; font-weight: bold; font-size: 12px; }
        .grid-empty { color: #ccc; font-size: 11px; }

        .today-highlight {
            background-color: #eaf2fd !important;
            border-left: 2px solid #1a73e8 !important;
            border-right: 2px solid #1a73e8 !important;
            font-weight: bold;
        }
        th.today-highlight { background-color: #1a73e8 !important; color: white !important; }
        th.today-highlight .day-subtext { color: #d2e3fc !important; }

        .summary-badge-p { background-color: #e6f4ea; color: #137333; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .summary-badge-a { background-color: #fce8e6; color: #c5221f; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        .btn-download {
            background-color: #34a853; color: white; border: none; padding: 8px 12px;
            font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; touch-action: manipulation;
        }
        
        .admin-section { display: none; width: 100%; max-width: 100%; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .btn-delete { background-color: transparent; color: #c5221f; border: none; cursor: pointer; font-size: 12px; padding: 0 2px; font-weight: bold; vertical-align: middle; touch-action: manipulation;}
        
        .device-table { min-width: 100% !important; font-size: 13px; }
        .btn-reset-dev { background-color: #fff4e5; color: #b06000; border: 1px solid #ff9800; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; touch-action: manipulation; transition: 0.2s; }
        .btn-reset-dev:active { background-color: #ffe0b2; }
    </style>
</head>
<body>

<div class="attendance-card">
    <h2>স্মার্ট হাজিরা</h2>
    <p class="info">Developed by সালমান</p>
    <input type="text" id="employeeId" class="emp-input" placeholder="আপনার আইডি (Employee ID) লিখুন">
    <button id="submitBtn" class="btn-submit">হাজিরা দিন (Entry / Exit)</button>
    <div id="responseMessage"></div>
    <div class="secret-dot" id="secretDotBtn">.</div>
</div>

<div class="admin-login-card" id="adminLoginCard">
    <h3>অ্যাডমিন প্যানেল লগইন</h3>
    <input type="text" id="adminUsername" class="admin-input" placeholder="ইউজারনেম দিন">
    <input type="password" id="adminPassword" class="admin-input" placeholder="পাসওয়ার্ড দিন">
    <button id="adminLoginBtn" class="btn-submit" style="background-color: #3c4043;">লগইন করুন</button>
</div>

<div class="admin-section" id="adminDashboard">
    
    <div class="report-container" style="max-width: 1000px; margin-left: auto; margin-right: auto; border: 1px solid #ff9800;">
        <h3 style="color: #e65100; font-weight: bold;">🔒 ডিভাইস সিকিউরিটি ও প্রক্সি কন্ট্রোল</h3>
        <p style="font-size: 12px; color: #666; margin-top:-5px;">কর্মচারী ফোন পরিবর্তন করলে বা প্রক্সি লক ক্লিয়ার করতে এখান থেকে "Reset Device" করুন।</p>
        <div class="table-responsive">
            <table class="device-table">
                <thead>
                    <tr style="background-color: #ffe0b2;">
                        <th>আইডি</th>
                        <th>নাম</th>
                        <th>ডিভাইস লক স্ট্যাটাস</th>
                        <th>অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="report-container" style="background: #eaf2fd; max-width: 1000px; margin-left: auto; margin-right: auto;">
        <h3 style="color: #1a73e8; font-weight: bold;">🛠️ ম্যানুয়াল এন্ট্রি প্যানেল</h3>
        <div class="admin-grid">
            <select id="manualEmpId" class="admin-input">
                <option value="">কর্মচারী নির্বাচন করুন...</option>
                <option value="1001">Utsob (1001)</option>
                <option value="1002">Sagor (1002)</option>
                <option value="1003">Rasel (1003)</option>
                <option value="1004">Salman (1004)</option>
                <option value="1005">Raihan (1005)</option>
            </select>
            <select id="manualStatus" class="admin-input">
                <option value="Present">Present (উপস্থিত)</option>
                <option value="Off Day">Off Day (অফ ডে)</option>
                <option value="Late">Late (দেরি)</option>
                <option value="Absent">Absent (অনুপস্থিত)</option>
            </select>
        </div>
        <div class="admin-grid">
            <input type="date" id="manualDate" class="admin-input">
            <input type="time" id="manualEntryTime" class="admin-input" placeholder="Entry Time" value="10:00">
            <input type="time" id="manualExitTime" class="admin-input" placeholder="Exit Time">
        </div>
        <button id="manualSubmitBtn" class="btn-submit" style="background-color: #1a73e8;">তথ্য যুক্ত / আপডেট করুন</button>
    </div>

    <div class="report-container" style="max-width: 100%; overflow: hidden;">
        <div class="excel-filter-area">
            <div>
                <label for="monthFilter" style="font-weight: 600; color: #5f6368; margin-right: 8px;">মাস নির্বাচন:</label>
                <select id="monthFilter" class="month-dropdown">
                    <option value="1">জানুয়ারি (January)</option>
                    <option value="2">ফেব্রুয়ারি (February)</option>
                    <option value="3">মার্চ (March)</option>
                    <option value="4">এপ্রিল (April)</option>
                    <option value="5">মে (May)</option>
                    <option value="6">জুন (June)</option>
                    <option value="7">জুলাই (July)</option>
                    <option value="8">আগস্ট (August)</option>
                    <option value="9">সেপ্টেম্বর (September)</option>
                    <option value="10">অক্টোবর (October)</option>
                    <option value="11">নভেম্বর (November)</option>
                    <option value="12">ডিসেম্বর (December)</option>
                </select>
            </div>
            <button id="downloadBtn" class="btn-download">Excel ডাউনলোড</button>
        </div>

        <div class="table-responsive">
            <table id="sheetTable">
                <thead>
                    <tr id="tableHeaderRow"></tr>
                </thead>
                <tbody id="sheetTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCFBj-6URVjyCsO3ERZQGroPi1eWAUaV6M",
        authDomain: "sallu-c83fa.firebaseapp.com",
        databaseURL: "https://sallu-c83fa-default-rtdb.firebaseio.com",
        projectId: "sallu-c83fa",
        storageBucket: "sallu-c83fa.firebasestorage.app",
        messagingSenderId: "631719412254",
        appId: "1:631719412254:web:67b174371e595644a6e40f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const OFFICE_LAT = 23.937436; 
    const OFFICE_LON = 90.707879;
    const ALLOWED_RADIUS_METERS = 50; 

    const TELEGRAM_BOT_TOKEN = '8807408250:AAE82N0I_SsEe0f_9qBUPVPxO77I3hOtULg'; 
    const TELEGRAM_CHAT_ID = '8668922517';     

    const employeeDatabase = {
        "1001": "Utsob",
        "1002": "Sagor",
        "1003": "Rasel",
        "1004": "Salman",
        "1005": "Raihan"
    };

    const banglaDays = ['রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহস্পতি', 'শুক্র', 'শনি'];

    const submitBtn = document.getElementById('submitBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const msgBox = document.getElementById('responseMessage');
    const sheetTableBody = document.getElementById('sheetTableBody');
    const tableHeaderRow = document.getElementById('tableHeaderRow');
    const monthFilter = document.getElementById('monthFilter');
    const deviceTableBody = document.getElementById('deviceTableBody');
    
    let globalAttendanceLogs = [];
    let globalDevices = {};

    function setAutomaticCurrentMonth() {
        const liveDateObj = new Date();
        monthFilter.value = liveDateObj.getMonth() + 1;
    }
    setAutomaticCurrentMonth();

    function getLocalDeviceId() {
        let devId = localStorage.getItem('office_app_device_token');
        if (!devId) {
            devId = 'DEV-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('office_app_device_token', devId);
        }
        return devId;
    }

    document.getElementById('secretDotBtn').addEventListener('click', () => {
        const loginCard = document.getElementById('adminLoginCard');
        loginCard.style.display = loginCard.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('adminLoginBtn').addEventListener('click', () => {
        const user = document.getElementById('adminUsername').value.trim();
        const pass = document.getElementById('adminPassword').value;
        if (user === 'sallu' && pass === 'Aminternet') { 
            document.getElementById('adminLoginCard').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block'; 
            document.getElementById('secretDotBtn').style.display = 'none';
            
            setAutomaticCurrentMonth();
            generateTableHeader();
            renderSheetDashboard(globalAttendanceLogs);
            renderDeviceDashboard();
        } else {
            alert('ভুল ইউজারনেম অথবা পাসওয়ার্ড!');
        }
    });

    function generateTableHeader() {
        const selectedMonth = parseInt(monthFilter.value);
        const currentYear = new Date().getFullYear();
        const daysInMonth = new Date(currentYear, selectedMonth, 0).getDate();
        
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === currentYear && (today.getMonth() + 1) === selectedMonth);

        let headerHtml = `<th style="min-width: 60px;">আইডি</th><th style="min-width: 90px;">নাম</th>`;
        for (let i = 1; i <= daysInMonth; i++) {
            const tempDate = new Date(currentYear, selectedMonth - 1, i);
            const dayName = banglaDays[tempDate.getDay()];
            const isTodayColumn = (isCurrentMonth && today.getDate() === i) ? 'class="today-highlight"' : '';
            headerHtml += `<th ${isTodayColumn} style="min-width: 95px;">${i}<span class="day-subtext">${dayName}</span></th>`;
        }
        headerHtml += `<th style="background-color: #e6f4ea; min-width: 40px;">P</th>`;
        headerHtml += `<th style="background-color: #fce8e6; min-width: 40px;">A</th>`;
        tableHeaderRow.innerHTML = headerHtml;
    }

    function renderSheetDashboard(logs) {
        if (document.getElementById('adminDashboard').style.display !== 'block') return;
        
        sheetTableBody.innerHTML = '';
        const selectedMonth = parseInt(monthFilter.value);
        const currentYear = new Date().getFullYear();
        const daysInMonth = new Date(currentYear, selectedMonth, 0).getDate();
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === currentYear && (today.getMonth() + 1) === selectedMonth);

        Object.keys(employeeDatabase).forEach(empId => {
            const empName = employeeDatabase[empId];
            const empLogs = logs.filter(log => {
                if (log.id !== empId) return false;
                let m = null;
                if (log.rawDate) m = new Date(log.rawDate).getMonth() + 1;
                return m === selectedMonth;
            });

            let monthDaysData = {};
            empLogs.forEach(log => {
                if (log.rawDate) {
                    const dateDay = new Date(log.rawDate).getDate();
                    monthDaysData[dateDay] = log;
                }
            });

            let daysHtml = ''; let pCount = 0; let aCount = 0;

            for (let d = 1; d <= daysInMonth; d++) {
                const isTodayCell = (isCurrentMonth && today.getDate() === d) ? 'class="today-highlight"' : '';

                if (monthDaysData[d]) {
                    const logData = monthDaysData[d];
                    const status = logData.status;
                    const key = logData.fbKey;
                    
                    if (status !== 'Absent') {
                        pCount++;
                        let inTimeClass = status === 'Present' ? 'grid-time-in' : 'grid-time-late';
                        let outHtml = logData.exitTime ? `<span class="grid-time-out">Out: ${logData.exitTime}</span>` : `<span style="color:#aaa; font-size:9px;">No Exit</span>`;
                        
                        daysHtml += `<td ${isTodayCell}>
                            <div class="time-box-container">
                                <span class="${inTimeClass}">In: ${logData.time}</span>
                                ${outHtml}
                            </div>
                            <button class="btn-delete" onclick="deleteRecord('${key}')">×</button>
                        </td>`;
                    } else {
                        aCount++;
                        daysHtml += `<td ${isTodayCell}><span class="grid-a">A</span><button class="btn-delete" onclick="deleteRecord('${key}')">×</button></td>`;
                    }
                } else {
                    if (isCurrentMonth && d > today.getDate()) {
                        daysHtml += `<td ${isTodayCell} class="grid-empty">-</td>`;
                    } else {
                        aCount++;
                        daysHtml += `<td ${isTodayCell} class="grid-empty" style="color:#c5221f; font-weight:bold;">A</td>`;
                    }
                }
            }

            const row = document.createElement('tr');
            row.innerHTML = `<td class="meta-cell">${empId}</td><td class="meta-cell" style="color:#1a73e8;">${empName}</td>${daysHtml}<td><span class="summary-badge-p">${pCount}</span></td><td><span class="summary-badge-a">${aCount}</span></td>`;
            sheetTableBody.appendChild(row);
        });
    }

    function renderDeviceDashboard() {
        if (document.getElementById('adminDashboard').style.display !== 'block') return;
        deviceTableBody.innerHTML = '';
        
        Object.keys(employeeDatabase).forEach(empId => {
            const empName = employeeDatabase[empId];
            const hasDevice = globalDevices[empId];
            
            let statusText = hasDevice ? `<span style="color:#137333; font-weight:bold;">🔒 লকড (Device Bound)</span>` : `<span style="color:#b06000;">🔓 আনলকড (নতুন ফোনে এড হবে)</span>`;
            let actionBtn = hasDevice ? `<button class="btn-reset-dev" onclick="resetEmployeeDevice('${empId}')">Reset Device</button>` : `<button class="btn-reset-dev" disabled style="background:#eee; color:#aaa; border-color:#aaa; cursor:not-allowed;">No Active Device</button>`;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${empId}</b></td><td style="color:#1a73e8; font-weight:bold;">${empName}</td><td>${statusText}</td><td>${actionBtn}</td>`;
            deviceTableBody.appendChild(tr);
        });
    }

    window.resetEmployeeDevice = function(empId) {
        if (confirm(`${employeeDatabase[empId]}-এর ডিভাইস লক রিসেট করতে চান?`)) {
            db.ref(`registeredDevices/${empId}`).remove().then(() => {
                alert("ডিভাইস সফলভাবে রিসেট হয়েছে!");
            });
        }
    }

    db.ref('attendanceLogs').on('value', (snapshot) => {
        const data = snapshot.val(); globalAttendanceLogs = [];
        if (data) {
            Object.keys(data).forEach(key => { let item = data[key]; item.fbKey = key; globalAttendanceLogs.push(item); });
        }
        generateTableHeader(); renderSheetDashboard(globalAttendanceLogs);
    });

    db.ref('registeredDevices').on('value', (snapshot) => {
        globalDevices = snapshot.val() || {};
        renderDeviceDashboard();
    });

    monthFilter.addEventListener('change', () => { generateTableHeader(); renderSheetDashboard(globalAttendanceLogs); });

    function getCustomBanglaDateTime(manualDateStr = null, manualTimeStr = null) {
        const now = manualDateStr ? new Date(manualDateStr + 'T' + (manualTimeStr || '00:00')) : new Date();
        const customDays = ['রবি বার', 'সোম বার', 'মঙ্গল বার', 'বুধ বার', 'বৃহস্পতি বার', 'শুক্র বার', 'শনি বার'];
        
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0'+minutes : minutes;
        let strTime = (hours < 10 ? '0'+hours : hours) + ':' + minutes + ' ' + ampm;

        return { 
            fullDate: `${customDays[now.getDay()]}, ${now.getDate()} তারিখ ${now.getMonth() + 1} মাস ${now.getFullYear().toString().slice(-2)}`, 
            time: strTime, 
            rawObj: now 
        };
    }

    function formatManualTime12Hour(timeStr) {
        if(!timeStr) return "";
        const parts = timeStr.split(':');
        let hours = parseInt(parts[0]);
        let minutes = parseInt(parts[1]);
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        return (hours < 10 ? '0'+hours : hours) + ':' + (minutes < 10 ? '0'+minutes : minutes) + ' ' + ampm;
    }

    window.deleteRecord = function(key) { if (confirm("তথ্য টি মুছে ফেলতে চান?")) db.ref(`attendanceLogs/${key}`).remove(); }

    document.getElementById('manualSubmitBtn').addEventListener('click', () => {
        const mId = document.getElementById('manualEmpId').value; 
        const mStatus = document.getElementById('manualStatus').value;
        const mDate = document.getElementById('manualDate').value; 
        const mEntryTime = document.getElementById('manualEntryTime').value;
        const mExitTime = document.getElementById('manualExitTime').value;
        
        if (!mId || !mDate) { alert("সঠিক তথ্য দিন!"); return; }
        
        const dtObj = getCustomBanglaDateTime(mDate, mEntryTime);
        const formattedExit = mExitTime ? formatManualTime12Hour(mExitTime) : "";

        db.ref('attendanceLogs').push().set({ 
            rawDate: dtObj.rawObj.toISOString(), 
            date: dtObj.fullDate, 
            id: mId, 
            name: employeeDatabase[mId], 
            time: dtObj.time, 
            exitTime: formattedExit, 
            status: mStatus 
        });
        alert(`তথ্য সফলভাবে যুক্ত হয়েছে।`);
    });

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
        const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
        return R * (2 * Math.atan2(Math.sqrt(Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2)), Math.sqrt(1-(Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2))))); 
    }

    function sendTelegramNotification(empId, empName, distance, timeNow, dateNow, status, isExit = false) {
        let textMsg = `🔔 *হাজিরা অ্যালার্ট!*\n\n📅 তারিখ: ${dateNow}\n👤 कर्मचारी: ${empName}\n🆔 আইডি: ${empId}\n⏰ সময়: ${timeNow}\n📊 স্ট্যাটাস: ${status === 'Present' ? '✅ উপস্থিত (Entry)' : (status === 'Late' ? '⚠️ লেট (Entry)' : '❌ অনুপস্থিত')}\n📍 দূরত্ব: অফিস থেকে ${Math.round(distance)} মিটার ভেতরে`;
        if(isExit) {
            textMsg = `🚪 *অফিস এক্সিট (Exit) অ্যালার্ট!*\n\n📅 তারিখ: ${dateNow}\n👤 कर्मचारी: ${empName}\n🆔 আইডি: ${empId}\n⏰ বের হওয়ার সময়: ${timeNow}\n📍 দূরত্ব: অফিস থেকে ${Math.round(distance)} মিটার ভেতরে`;
        }
        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: textMsg, parse_mode: 'Markdown' })
        });
    }

    function handleAttendanceCheckIn() {
        const empId = document.getElementById('employeeId').value.trim();
        if (!empId || !employeeDatabase[empId]) { showBox("সঠিক আইডি দিন!", "error"); return; }

        const currentDeviceId = getLocalDeviceId();

        submitBtn.disabled = true;
        showBox("ডাটাবেজ ও সিকিউরিটি চেক করা হচ্ছে...", "loading");

        const todayObj = new Date();
        const currentDay = todayObj.getDate();
        const currentMonth = todayObj.getMonth() + 1;
        const currentYear = todayObj.getFullYear();

        // আজকের হাজিরা ডাটা খোঁজা হচ্ছে
        const userTodayRecords = globalAttendanceLogs.filter(log => {
            if (log.id !== empId) return false;
            if (!log.rawDate) return false;
            const logDate = new Date(log.rawDate);
            return logDate.getDate() === currentDay && 
                   (logDate.getMonth() + 1) === currentMonth && 
                   logDate.getFullYear() === currentYear;
        });

        db.ref(`registeredDevices/${empId}`).once('value', (snapshot) => {
            const registeredDeviceId = snapshot.val();

            if (registeredDeviceId && registeredDeviceId !== currentDeviceId) {
                showBox("❌ ডিভাইস সিকিউরিটি অ্যালার্ট! আপনার নিজের ফোন থেকে হাজিরা দিন।", "error");
                submitBtn.disabled = false;
                return;
            }

            showBox("লোকেশন ভেরিফাই করা হচ্ছে...", "loading");

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const distance = getDistance(OFFICE_LAT, OFFICE_LON, position.coords.latitude, position.coords.longitude);
                    if (distance <= ALLOWED_RADIUS_METERS) {
                        const dt = getCustomBanglaDateTime();

                        // 🛑 এক্সিট টাইম (Exit Time) আপডেট লজিক
                        if (userTodayRecords.length > 0) {
                            const mainRecord = userTodayRecords[0]; // আজকের অলরেডি থাকা এন্ট্রি
                            
                            if (mainRecord.status === 'Absent') {
                                showBox("❌ আপনি আজ অলরেডি অনুপস্থিত (Absent) হিসেবে চিহ্নিত।", "error");
                                submitBtn.disabled = false;
                                return;
                            }

                            // ফায়ারবেসে Exit Time ও লাইভ ডাটা পুশ
                            db.ref(`attendanceLogs/${mainRecord.fbKey}`).update({
                                exitTime: dt.time
                            }).then(() => {
                                sendTelegramNotification(empId, employeeDatabase[empId], distance, dt.time, dt.fullDate, mainRecord.status, true);
                                showBox(`🚪 এক্সিট সফল! বের হওয়ার সময়: ${dt.time}`, "success");
                            }).catch((err) => {
                                showBox("❌ ডাটাবেজ আপডেট এরর!", "error");
                            });
                            return;
                        }

                        // 🟢 নতুন এন্ট্রি টাইম (Entry Time) লজিক
                        if (dt.rawObj.getHours() >= 20) {
                            showBox("❌ সময় শেষ!", "error");
                            db.ref('attendanceLogs').push().set({ rawDate: dt.rawObj.toISOString(), date: dt.fullDate, id: empId, name: employeeDatabase[empId], time: dt.time, exitTime: "", status: "Absent" });
                            return;
                        }

                        if (!registeredDeviceId) {
                            db.ref(`registeredDevices/${empId}`).set(currentDeviceId);
                        }

                        let finalStatus = "Present";
                        const hours = dt.rawObj.getHours(); const minutes = dt.rawObj.getMinutes();
                        if (hours > 10 || (hours === 10 && minutes > 30)) finalStatus = "Late";

                        db.ref('attendanceLogs').push().set({ 
                            rawDate: dt.rawObj.toISOString(), 
                            date: dt.fullDate, 
                            id: empId, 
                            name: employeeDatabase[empId], 
                            time: dt.time, 
                            exitTime: "", 
                            status: finalStatus 
                        });

                        sendTelegramNotification(empId, employeeDatabase[empId], distance, dt.time, dt.fullDate, finalStatus, false);
                        showBox("✅ হাজিরা (Entry) সফল! সময়: " + dt.time, "success");
                    } else {
                        showBox("❌ আপনি অফিস থেকে " + Math.round(distance) + " মিটার দূরে আছেন।", "error");
                    }
                },
                (error) => { showBox("GPS অন করুন এবং লোকেশন পারমিশন দিন।", "error"); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        });
    }

    submitBtn.addEventListener('click', (e) => { e.preventDefault(); handleAttendanceCheckIn(); });
    submitBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAttendanceCheckIn(); }, {passive: false});

    downloadBtn.addEventListener('click', () => {
        if (globalAttendanceLogs.length === 0) { alert("কোনো রেকর্ড নেই!"); return; }
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFআইডি,নাম,তারিখ,ইন টাইম,আউট টাইম,স্ট্যাটাস\n";
        globalAttendanceLogs.forEach(log => { csvContent += `"${log.id}","${log.name}","${log.date}","${log.time}","${log.exitTime || '-'}","${log.status}"\n`; });
        const encodedUri = encodeURI(csvContent); const link = document.createElement("a"); link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Attendance_Sheet_Month_${monthFilter.value}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });

    function showBox(text, type) { msgBox.innerText = text; msgBox.className = type; msgBox.style.display = "block"; if (type !== "loading" && !text.includes("ডিভাইস")) submitBtn.disabled = false; }
</script>
