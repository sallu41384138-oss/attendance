<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Attendance App</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .attendance-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 360px;
            width: 100%;
            margin-bottom: 30px;
        }
        h2 { color: #1a73e8; margin-bottom: 8px; font-size: 24px; }
        p.info { color: #5f6368; font-size: 14px; margin-bottom: 25px; }
        
        .emp-input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .emp-input:focus { border-color: #1a73e8; }

        .btn-submit {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-submit:disabled { background-color: #bcc1c8; cursor: not-allowed; }
        
        #responseMessage {
            margin-top: 20px;
            font-weight: 600;
            font-size: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .success { background-color: #e6f4ea; color: #137333; }
        .error { background-color: #fce8e6; color: #c5221f; }
        .loading { background-color: #f1f3f4; color: #3c4043; }

        /* টেবিল সেকশন */
        .report-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            overflow-x: auto;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .report-header h3 { color: #3c4043; margin: 0; }
        
        .btn-download {
            background-color: #34a853;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-download:hover { background-color: #2b8c44; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #f0f2f5;
        }
        th {
            background-color: #f8f9fa;
            color: #5f6368;
        }
        tr:hover { background-color: #f8f9fa; }
        .empty-row {
            text-align: center;
            color: #9aa0a6;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="attendance-card">
    <h2>স্মার্ট হাজিরা</h2>
    <p class="info">লোকেশন লক: ৩০ মিটার (টেলিগ্রাম অ্যালার্ট)</p>
    
    <input type="text" id="employeeId" class="emp-input" placeholder="আপনার আইডি (Employee ID) লিখুন">
    <button id="submitBtn" class="btn-submit">حاضরি দিন (Check-In)</button>
    <div id="responseMessage"></div>
</div>

<div class="report-container">
    <div class="report-header">
        <h3>চলতি মাসের হাজিরার রেকর্ড</h3>
        <button id="downloadBtn" class="btn-download">Excel ডাউনলোড</button>
    </div>
    <table id="attendanceTable">
        <thead>
            <tr>
                <th>বার ও তারিখ</th>
                <th>আইডি</th>
                <th>নাম</th>
                <th>সময়</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody">
            </tbody>
    </table>
</div>

<script>
    // 📍 আপনার নিখুঁত লোকেশন (নরসিংদী)
    const OFFICE_LAT = 23.937768; 
    const OFFICE_LON = 90.707767;
    const ALLOWED_RADIUS_METERS = 30; 

    const TELEGRAM_BOT_TOKEN = '8807408250:AAE82N0I_SsEe0f_9qBUPVPxO77I3hOtULg'; 
    const TELEGRAM_CHAT_ID = '8668922517';     

    const employeeDatabase = {
        "1001": "Utsob",
        "1002": "Sagor",
        "1003": "Rasel",
        "1004": "Salman",
        "1005": "Raihan"
    };

    const submitBtn = document.getElementById('submitBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const msgBox = document.getElementById('responseMessage');
    const tableBody = document.getElementById('attendanceTableBody');

    // 📅 কাস্টম বাংলা দিন, মাস (সঠিক নম্বর) ও বছর জেনারেট করার লজিক
    function getCustomBanglaDateTime() {
        const now = new Date();
        
        const customDays = ['রবি বার', 'সোম বার', 'মঙ্গল বার', 'বুধ বার', 'বৃহস্পতি বার', 'শুক্র বার', 'সনি বার'];
        const currentDayName = customDays[now.getDay()];
        
        const dayNum = now.getDate(); 
        const monthNum = now.getMonth() + 1; // 🛠️ জাভাস্ক্রিপ্টের জন্য এখন মে মাস = ৫ একদম কারেক্ট দেখাবে
        const yearNum = now.getFullYear().toString().slice(-2); 
        
        // ফরম্যাট: মঙ্গল বার, ২৬ তারিখ ৫ মাস ২৬
        const customDateString = `${currentDayName}, ${dayNum} তারিখ ${monthNum} মাস ${yearNum}`;
        
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const formattedTime = now.toLocaleTimeString('en-US', timeOptions);

        return {
            fullDate: customDateString,
            time: formattedTime
        };
    }

    function loadAttendanceLog() {
        const logs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
        tableBody.innerHTML = '';

        if (logs.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" class="empty-row">আজ পর্যন্ত কোনো হাজিরা রেকর্ড নেই।</td></tr>`;
            return;
        }

        logs.reverse().forEach(log => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${log.date}</td>
                <td>${log.id}</td>
                <td><b>${log.name}</b></td>
                <td>${log.time}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    function saveAttendanceToLocal(empId, empName, dateNow, timeNow) {
        let logs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
        
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        logs = logs.filter(log => new Date(log.rawDate) > thirtyDaysAgo);

        const newLog = {
            rawDate: new Date().toISOString(),
            date: dateNow,
            id: empId,
            name: empName,
            time: timeNow
        };

        logs.push(newLog);
        localStorage.setItem('attendanceLogs', JSON.stringify(logs));
        loadAttendanceLog(); 
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const p1 = lat1 * Math.PI / 180;
        const p2 = lat2 * Math.PI / 180;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(p1) * Math.cos(p2) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    function sendTelegramNotification(empId, empName, distance, timeNow, dateNow) {
        const message = `🔔 *নতুন হাজিরা অ্যালার্ট!*\n\n📅 তারিখ: ${dateNow}\n👤 कर्मचारी: ${empName}\n🆔 আইডি: ${empId}\n⏰ সময়: ${timeNow}\n📍 দূরত্ব: অফিস থেকে ${Math.round(distance)} মিটার ভেতরে`;
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
    }

    submitBtn.addEventListener('click', () => {
        const empId = document.getElementById('employeeId').value.trim();
        
        if (!empId) {
            showBox("দয়া করে আপনার আইডি লিখুন!", "error");
            return;
        }

        if (!employeeDatabase[empId]) {
            showBox("ভুল আইডি! এই আইডির কোনো কর্মচারী নেই।", "error");
            return;
        }

        const empName = employeeDatabase[empId]; 
        submitBtn.disabled = true;
        showBox("লোকেশন চেক করা হচ্ছে...", "loading");

        if (!navigator.geolocation) {
            showBox("আপনার ব্রাউজারে জিপিএস সাপোর্ট করে না।", "error");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                if (accuracy > 50) {
                    showBox("জিপিএস সিগন্যাল দুর্বল! খোলা জায়গায় গিয়ে আবার চেষ্টা করুন।", "error");
                    return;
                }

                const distance = getDistance(OFFICE_LAT, OFFICE_LON, userLat, userLon);

                if (distance <= ALLOWED_RADIUS_METERS) {
                    const dt = getCustomBanglaDateTime();
                    
                    sendTelegramNotification(empId, empName, distance, dt.time, dt.fullDate);
                    saveAttendanceToLocal(empId, empName, dt.fullDate, dt.time);

                    showBox(`✅ হাজিরা সফল, ${empName}! সময়: ${dt.time}. রেকর্ড যুক্ত হয়েছে।`, "success");
                } else {
                    showBox(`❌ হাজিরা হয়নি! আপনি অফিস থেকে ${Math.round(distance)} মিটার দূরে আছেন।`, "error");
                }
            },
            (error) => {
                showBox("লোকেশন পারমিশন (Allow) করুন এবং ফোনের GPS অন করুন।", "error");
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    });

    downloadBtn.addEventListener('click', () => {
        const logs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
        if (logs.length === 0) {
            alert("ডাউনলোড করার মতো কোনো হাজিরা রেকর্ড নেই!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "বার ও তারিখ,আইডি,নাম,সময়\n";

        logs.forEach(log => {
            csvContent += `"${log.date}","${log.id}","${log.name}","${log.time}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Attendance_Report.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    function showBox(text, type) {
        msgBox.innerText = text;
        msgBox.className = type;
        msgBox.style.display = "block";
        if (type !== "loading") submitBtn.disabled = false;
    }

    loadAttendanceLog();
</script>
</body>
</html>
